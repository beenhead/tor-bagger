<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tor Bagger - Explorer Portal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f4f4f9;}
        #map-container { flex: 1; height: 100%; position: relative; }
        #map { height: 100%; width: 100%; }
        
        #sidebar { width: 380px; background: white; padding: 20px; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; overflow-y: auto;}
        h1 { margin-top: 0; color: #2c3e50; font-size: 1.5rem; border-bottom: 2px solid #27ae60; padding-bottom: 10px;}
        
        .nav-tabs { display: flex; margin-bottom: 20px; border-radius: 6px; overflow: hidden; border: 1px solid #27ae60; flex-wrap: wrap;}
        .nav-btn { flex: 1; min-width: 80px; padding: 10px; text-align: center; background: white; color: #27ae60; cursor: pointer; border: none; font-weight: bold; font-size: 0.8rem;}
        .nav-btn.active { background: #27ae60; color: white; }
        
        .panel { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        button:hover { background: #219653; }
        .btn-admin { background: #3498db; }
        .btn-logout { background: #e74c3c; margin-top: 20px; }

        /* Status Box */
        #status-box { font-size: 0.9rem; margin-top: 10px; padding: 10px; border-radius: 4px; cursor: pointer;}
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Dashboard & Table Styles */
        .stat-box { background: white; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #ddd; }
        .progress-bar-bg { background: #e9ecef; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px;}
        .progress-bar-fill { background: #27ae60; height: 100%; width: 0%; transition: width 0.5s ease;}
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="sidebar">
        <h1>⛰️ Tor Bagger</h1>
        <button id="main-logout-btn" class="btn-logout hidden" onclick="handleLogout()">Logout</button>
        <div id="nav-menu" class="nav-tabs hidden">
            <button class="nav-btn active" onclick="switchTab('map-panel')">Map</button>
            <button class="nav-btn" onclick="switchTab('dashboard-panel')">Stats</button>
            <button class="nav-btn" onclick="switchTab('leaderboard-panel')">Leaders</button>
            <button id="admin-nav-btn" class="nav-btn hidden" onclick="switchTab('admin-panel')" style="color: #3498db; border-left: 1px solid #3498db;">Admin</button>
        </div>

        <div id="login-panel" class="panel">
            <h3>Login</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
        </div>

        <div id="map-panel" class="panel hidden tab-content">
            <h3>Find a Tor</h3>
            <input type="text" id="tor-search" placeholder="Type a name…" oninput="searchTors(this.value)" autocomplete="off">
            <div id="tor-search-results" class="hidden" style="background: white; border: 1px solid #ddd; border-radius: 4px; max-height: 220px; overflow-y: auto; margin-top: 4px;"></div>
            <hr style="margin: 18px 0;">
            <h3>GPS Upload</h3>
            <input type="file" id="gpx-file" accept=".gpx">
            <button onclick="uploadGPX()">Analyze Hike</button>
            <div id="gpx-spinner" class="loader hidden"></div>
            <div id="gpx-result" class="hidden" style="margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.85rem;"></div>
            <button class="btn-admin" onclick="openNewTorForm()">➕ Add Missing Tor</button>
        </div>

        <div id="dashboard-panel" class="panel hidden tab-content">
            <h3>Your Progress</h3>
            <div class="stat-box">
                <div id="dash-bagged-count" style="font-size: 2rem; font-weight: bold; color: #27ae60;">0</div>
                <div id="dash-total-tors" style="font-size: 0.8rem; color: #666;">Tors Bagged</div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="dash-progress-fill"></div></div>
            </div>
            <hr>
            <div style="text-align: left; margin-top: 15px;">
                <h4 style="margin-bottom: 10px; color: #333;">Conquered Peaks</h4>
                <ul id="bagged-tors-list" style="list-style: none; padding: 0; max-height: 200px; overflow-y: auto; font-size: 0.9rem;">
                    <!-- Tors will be injected here -->
                </ul>
            </div>
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>

        <div id="leaderboard-panel" class="panel hidden tab-content">
            <h3>Leaderboard</h3>
            <table>
                <thead><tr><th>#</th><th>User</th><th>Bagged</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <div id="admin-panel" class="panel hidden tab-content">
            <h3 style="color: #3498db;">Approval Queue</h3>
            <div id="suggestion-list">No pending suggestions.</div>
        </div>

        <div id="status-box" class="hidden"></div>
    </div>

    <div id="suggest-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 24px; border-radius: 8px; width: 90%; max-width: 440px; box-shadow: 0 6px 24px rgba(0,0,0,0.2);">
            <h3 id="suggest-modal-title" style="margin: 0 0 4px;">Suggest Correction</h3>
            <div id="suggest-modal-coords" style="font-size: 0.8rem; color: #666; margin-bottom: 12px;"></div>
            <label style="font-size: 0.85rem; color: #333;">Name</label>
            <input type="text" id="suggest-name">
            <label style="font-size: 0.85rem; color: #333; display: block; margin-top: 8px;">Elevation (m)</label>
            <input type="number" id="suggest-elev" min="0">
            <label style="font-size: 0.85rem; color: #333; display: block; margin-top: 8px;">Description</label>
            <textarea id="suggest-desc" style="min-height: 90px; resize: vertical;"></textarea>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button onclick="closeSuggestModal()" style="background: #95a5a6;">Cancel</button>
                <button onclick="submitSuggestModal()">Submit</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([50.5719, -3.9811], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        let currentRouteLine = null;
        let markers = L.layerGroup().addTo(map);
        let torsById = new Map();
        let markersByTorId = new Map();
        let statusTimeout;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            event.target.classList.add('active');
            if(tabId === 'leaderboard-panel') loadLeaderboard();
            if(tabId === 'admin-panel') loadSuggestions();
            if(tabId === 'dashboard-panel') loadMapData();
        }

        function showStatus(message, isError = false) {
            const box = document.getElementById('status-box');
            box.classList.remove('hidden');
            box.innerText = message + "\n(Click to dismiss)";
            box.className = isError ? 'error' : 'success';
            box.onclick = () => box.classList.add('hidden');
            if (statusTimeout) clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => box.classList.add('hidden'), 15000);
        }

        async function handleLogin() {
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            try {
                const res = await fetch('http://127.0.0.1:8000/token', { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('tor_token', data.access_token);
                    localStorage.setItem('is_admin', data.is_admin);
                    checkAuth();
                } else { showStatus("Login Failed", true); }
            } catch (e) { showStatus("Connection Error", true); }
        }

        function handleLogout() {
            localStorage.clear();
            location.reload();
        }

        function checkAuth() {
            const token = localStorage.getItem('tor_token');
            const isAdmin = localStorage.getItem('is_admin') === 'true';
            const logoutBtn = document.getElementById('main-logout-btn');

            if (token) {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('nav-menu').classList.remove('hidden');
                document.getElementById('map-panel').classList.remove('hidden');
                
                // Show the logout button
                if (logoutBtn) logoutBtn.classList.remove('hidden');
                
                if (isAdmin) document.getElementById('admin-nav-btn').classList.remove('hidden');
            } else {
                // Hide it if logged out
                if (logoutBtn) logoutBtn.classList.add('hidden');
            }
            loadMapData();
        }

        async function loadMapData() {
            markers.clearLayers();
            torsById.clear();
            markersByTorId.clear();
            const torsRes = await fetch('http://127.0.0.1:8000/tors');
            const torsData = await torsRes.json();
            let baggedIds = [];
            if (localStorage.getItem('tor_token')) {
                const res = await fetch('http://127.0.0.1:8000/my-bagged-tors', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('tor_token')}` }
                });
                if (res.ok) {
                    const d = await res.json();
                    baggedIds = (d.logs || []).map(l => l.tor_id);
                    updateDashboard(d.logs || [], torsData.tors.length);
                }
            }
            torsData.tors.forEach(tor => {
                const isBagged = baggedIds.includes(tor.id);
                const marker = L.circleMarker([tor.lat, tor.lon], {
                    radius: isBagged ? 9 : 7, fillColor: isBagged ? "#27ae60" : "#7f8c8d",
                    color: "#fff", weight: 2, fillOpacity: 0.9
                });
                
                const stars = tor.avg_rating > 0 ? "⭐".repeat(Math.round(tor.avg_rating)) : "No ratings";
                const description = tor.description ? `<p style="font-size: 0.8rem; color: #444;">${tor.description}</p>` : "<i>No description available.</i>";
                let popup = `
                    <div style="min-width:220px; max-width: 300px;">
                        <b style="font-size: 1.1rem;">${tor.name}</b><br>
                        <span style="color: #666;">${tor.elevation_m}m | ${stars}</span>
                        <hr>
                        
                        <div style="font-size: 0.85rem; color: #444; margin-bottom: 10px; line-height: 1.4;">
                            ${tor.description ? tor.description : "<i>No description available yet.</i>"}
                        </div>
                        
                        <hr>
                        
                        <div id="revs-${tor.id}" style="font-size:0.8rem; max-height:80px; overflow-y:auto; background: #fdfdfd; padding: 5px;">
                            Loading reviews...
                        </div>
                `;


                if(isBagged) {
                    popup += `<hr><textarea id="c-${tor.id}" placeholder="Review..." style="height:30px"></textarea><button onclick="submitReview(${tor.id})" style="padding:4px; font-size:0.7rem">Rate 5⭐</button>`;
                }
                popup += `<br><a href="#" onclick="openEditForm(${tor.id}); return false;" style="font-size:0.7rem; color:#3498db">Suggest Correction</a></div>`;
                
                marker.bindPopup(popup).on('popupopen', () => fetchReviews(tor.id));
                markers.addLayer(marker);
                torsById.set(tor.id, tor);
                markersByTorId.set(tor.id, marker);
            });
        }

        function searchTors(query) {
            const resultsBox = document.getElementById('tor-search-results');
            const q = query.trim().toLowerCase();
            if (q.length < 2) {
                resultsBox.classList.add('hidden');
                resultsBox.innerHTML = '';
                return;
            }
            const matches = [...torsById.values()]
                .filter(t => t.name.toLowerCase().includes(q))
                .sort((a, b) => {
                    const an = a.name.toLowerCase();
                    const bn = b.name.toLowerCase();
                    const aStarts = an.startsWith(q);
                    const bStarts = bn.startsWith(q);
                    if (aStarts !== bStarts) return aStarts ? -1 : 1;
                    return an.localeCompare(bn);
                })
                .slice(0, 8);
            if (matches.length === 0) {
                resultsBox.innerHTML = '<div style="padding: 10px; color: #999; font-size: 0.85rem;">No matches</div>';
            } else {
                resultsBox.innerHTML = matches.map(t =>
                    `<div onclick="selectTor(${t.id})" style="padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='white'">⛰️ <strong>${t.name}</strong> <span style="color: #888; float: right;">${t.elevation_m || 0}m</span></div>`
                ).join('');
            }
            resultsBox.classList.remove('hidden');
        }

        function selectTor(torId) {
            const tor = torsById.get(torId);
            const marker = markersByTorId.get(torId);
            if (!tor || !marker) return;
            map.flyTo([tor.lat, tor.lon], 14, { duration: 0.8 });
            marker.openPopup();
            document.getElementById('tor-search').value = '';
            document.getElementById('tor-search-results').classList.add('hidden');
        }

        function updateDashboard(logs, totalTors) {
            const count = logs.length;
            document.getElementById('dash-bagged-count').innerText = count;
            const pct = totalTors > 0 ? (count / totalTors) * 100 : 0;
            document.getElementById('dash-progress-fill').style.width = `${pct}%`;

            const list = document.getElementById('bagged-tors-list');
            if (count > 0) {
                list.innerHTML = logs.map(log => `
                    <li style="padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                        <span>⛰️ <strong>${log.tor_name}</strong></span>
                        <span style="color: #888; font-size: 0.8rem;">${log.bagged_at ? new Date(log.bagged_at).toLocaleDateString() : ''}</span>
                    </li>
                `).join('');
            } else {
                list.innerHTML = "<li style='color: #999;'>No tors bagged yet. Time to hike!</li>";
            }
        }

        async function fetchReviews(id) {
            const res = await fetch(`http://127.0.0.1:8000/tors/${id}/reviews`);
            const revs = await res.json();
            document.getElementById(`revs-${id}`).innerHTML = revs.length ? revs.map(r => `<div>${"⭐".repeat(r.rating)}: ${r.comment}</div>`).join('') : "No reviews.";
        }

        async function submitReview(id) {
            await fetch(`http://127.0.0.1:8000/tors/${id}/reviews`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('tor_token')}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ rating: 5, comment: document.getElementById(`c-${id}`).value })
            });
            map.closePopup();
            loadMapData();
        }

        function renderGpxResult(html, kind) {
            const box = document.getElementById('gpx-result');
            box.innerHTML = html;
            box.className = kind; // 'success' | 'error'
            box.style.marginTop = '12px';
            box.style.padding = '10px';
            box.style.borderRadius = '6px';
            box.style.fontSize = '0.85rem';
        }

        async function uploadGPX() {
            const fileInput = document.getElementById('gpx-file');
            const spinner = document.getElementById('gpx-spinner');
            const resultBox = document.getElementById('gpx-result');

            if (fileInput.files.length === 0) {
                renderGpxResult("Please select a GPX file first.", 'error');
                return;
            }

            spinner.classList.remove('hidden');
            resultBox.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('http://127.0.0.1:8000/upload-gpx', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('tor_token')}` },
                    body: formData
                });

                if (response.ok) {
                    const r = await response.json();
                    const bagged = r.tors_bagged_on_this_walk || [];
                    const misses = r.near_misses || [];
                    const parts = [`<strong>Bagged ${r.total_bagged_count} new tor${r.total_bagged_count === 1 ? '' : 's'}</strong>`];
                    if (bagged.length) {
                        parts.push('<ul style="margin: 6px 0 0 18px; padding: 0;">' + bagged.map(n => `<li>⛰️ ${n}</li>`).join('') + '</ul>');
                    }
                    if (misses.length) {
                        parts.push(`<div style="margin-top: 8px;"><strong>Near misses (${r.total_near_miss_count}):</strong></div>`);
                        parts.push('<ul style="margin: 4px 0 0 18px; padding: 0; color: #666;">' + misses.map(n => `<li>${n}</li>`).join('') + '</ul>');
                    }
                    renderGpxResult(parts.join(''), 'success');
                    loadMapData();
                } else {
                    const error = await response.json().catch(() => ({}));
                    renderGpxResult("Upload failed: " + (error.detail || response.statusText), 'error');
                }
            } catch (err) {
                console.error(err);
                renderGpxResult("An error occurred during upload.", 'error');
            } finally {
                spinner.classList.add('hidden');
            }
        }

        // --- ADMIN / SUGGESTION FUNCTIONS ---
        let suggestModalContext = null;

        function openSuggestModal({ title, lat, lon, name, elevation, description, torId }) {
            document.getElementById('suggest-modal-title').textContent = title;
            document.getElementById('suggest-modal-coords').textContent = `📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            document.getElementById('suggest-name').value = name || '';
            document.getElementById('suggest-elev').value = (elevation ?? '') === '' ? '' : elevation;
            document.getElementById('suggest-desc').value = description || '';
            suggestModalContext = { lat, lon, torId };
            document.getElementById('suggest-modal').classList.remove('hidden');
            document.getElementById('suggest-name').focus();
        }

        function closeSuggestModal() {
            suggestModalContext = null;
            document.getElementById('suggest-modal').classList.add('hidden');
        }

        async function submitSuggestModal() {
            if (!suggestModalContext) return;
            const name = document.getElementById('suggest-name').value.trim();
            const elev = parseInt(document.getElementById('suggest-elev').value, 10);
            const desc = document.getElementById('suggest-desc').value.trim();
            if (!name) { showStatus("Name is required", true); return; }
            if (Number.isNaN(elev)) { showStatus("Elevation must be a number", true); return; }

            try {
                const res = await fetch('http://127.0.0.1:8000/tors/suggest', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('tor_token')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        suggested_name: name,
                        suggested_lat: suggestModalContext.lat,
                        suggested_lon: suggestModalContext.lon,
                        suggested_elevation: elev,
                        suggested_description: desc || null,
                        tor_id: suggestModalContext.torId,
                    })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    showStatus("Submission failed: " + (err.detail || res.statusText), true);
                    return;
                }
                closeSuggestModal();
                showStatus("Suggestion sent!");
            } catch (e) {
                showStatus("Connection error", true);
            }
        }

        function openNewTorForm() {
            showStatus("Click on the map to set coordinates.");
            map.once('click', (e) => {
                openSuggestModal({
                    title: 'Add a Missing Tor',
                    lat: e.latlng.lat,
                    lon: e.latlng.lng,
                    name: '',
                    elevation: '',
                    description: '',
                    torId: null,
                });
            });
        }

        function openEditForm(torId) {
            const tor = torsById.get(torId);
            if (!tor) { showStatus("Tor not found", true); return; }
            map.closePopup();
            openSuggestModal({
                title: 'Suggest Correction',
                lat: tor.lat,
                lon: tor.lon,
                name: tor.name,
                elevation: tor.elevation_m ?? '',
                description: tor.description || '',
                torId: tor.id,
            });
        }

        async function loadSuggestions() {
            const res = await fetch('http://127.0.0.1:8000/admin/suggestions', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('tor_token')}` }
            });
            const data = await res.json();
            const list = document.getElementById('suggestion-list');
            
            if (data.length === 0) {
                list.innerHTML = "No pending suggestions.";
                return;
            }

            list.innerHTML = data.map(s => `
                <div class="panel" style="background:#fff; font-size:0.75rem; border-left: 5px solid #3498db;">
                    <strong>${s.tor_id ? 'CORRECTION' : 'NEW TOR'}</strong> for "${s.suggested_name}"
                    <input type="text" id="an-${s.id}" value="${s.suggested_name}" placeholder="Name">
                    <div style="display:flex; gap:5px;">
                        <input type="number" step="any" id="ala-${s.id}" value="${s.suggested_lat}" placeholder="Lat">
                        <input type="number" step="any" id="alo-${s.id}" value="${s.suggested_lon}" placeholder="Lon">
                    </div>
                    <input type="number" id="ael-${s.id}" value="${s.suggested_elevation ?? 0}" placeholder="Elevation (m)">
                    <textarea id="adesc-${s.id}" style="height: 80px; font-size: 0.75rem;" placeholder="Description">${s.suggested_description || ''}</textarea>

                    <div style="display: flex; gap: 8px;">
                        <button class="btn-admin" onclick="approveS(${s.id}, ${s.tor_id})" style="flex: 1;">Approve & Publish</button>
                        <button class="btn-logout" onclick="rejectS(${s.id})" style="flex: 1; margin-top: 10px;">Reject</button>
                    </div>
                </div>
            `).join('');
        }

// index.html -> update approveS()
        async function approveS(sid, torid) {
            const payload = {
                suggested_name: document.getElementById(`an-${sid}`).value,
                suggested_lat: parseFloat(document.getElementById(`ala-${sid}`).value),
                suggested_lon: parseFloat(document.getElementById(`alo-${sid}`).value),
                suggested_elevation: parseInt(document.getElementById(`ael-${sid}`).value, 10) || 0,
                suggested_description: document.getElementById(`adesc-${sid}`).value,
                tor_id: torid
            };

            await fetch(`http://127.0.0.1:8000/admin/approve/${sid}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('tor_token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            loadSuggestions();
            loadMapData();
        }

        async function rejectS(sid) {
            if (!confirm("Reject this suggestion?")) return;
            const res = await fetch(`http://127.0.0.1:8000/admin/reject/${sid}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('tor_token')}` }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                showStatus("Reject failed: " + (err.detail || res.statusText), true);
                return;
            }
            showStatus("Suggestion rejected.");
            loadSuggestions();
        }

        async function loadLeaderboard() {
            const res = await fetch('http://127.0.0.1:8000/leaderboard');
            const data = await res.json();
            document.getElementById('leaderboard-body').innerHTML = data.map(r => `<tr><td>${r.rank}</td><td>${r.username}</td><td>${r.total_bagged}</td></tr>`).join('');
        }

        checkAuth();
    </script>
</body>
</html>
